name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        $env:PLAYWRIGHT_BROWSERS_PATH="0"
        playwright install chromium
        
    - name: Build with PyInstaller
      run: |
        pyinstaller mahkama.spec
        
    - name: Compile Setup Installer
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ($tag -and $tag.StartsWith("v")) {
          $version = $tag.Substring(1)
        } else {
          $version = "1.2.0"
        }
        (Get-Content setup.iss) -replace '#define AppVersion "[^"]+"', "#define AppVersion `"$version`"" | Set-Content setup.iss
        iscc setup.iss

    - name: Rename files with version tag
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ($tag -and $tag -ne "main") {
          Copy-Item "dist/Mahkama_Dossier_Manager_Setup.exe" "dist/Mahkama Dossier Manager $tag.exe"
        } else {
          Copy-Item "dist/Mahkama_Dossier_Manager_Setup.exe" "dist/Mahkama Dossier Manager dev.exe"
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mahkama-Windows-App
        path: |
          dist/Mahkama Dossier Manager *.exe
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/Mahkama Dossier Manager *.exe
        draft: false
        prerelease: false
        generate_release_notes: true
